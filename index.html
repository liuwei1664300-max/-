<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>肉夹馍文案库</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --accent: #e67e22;
      --accent-hover: #d35400;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .container { max-width: 460px; width: 100%; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 24px;
      color: var(--accent);
    }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .refresh-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:active { background: var(--accent-hover); }
    .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--accent);
    }
    .card-content {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-secondary);
      white-space: pre-wrap;
      margin-bottom: 12px;
    }
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-copy {
      background: rgba(230,126,34,0.08);
      color: var(--accent);
    }
    .btn-copy:active {
      background: var(--accent);
      color: white;
    }
    .btn-copy.copied {
      background: #2ecc71;
      color: white;
    }
    .empty-tip {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      margin-top: 40px;
    }
    .loading {
      text-align: center;
      color: #aaa;
      margin-top: 40px;
    }
    .message {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .message.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🥙 肉夹馍文案库</h1>
    <div class="header-bar">
      <span style="color: #888; font-size: 14px;" id="countInfo"></span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadCopies()">🔄 刷新文案</button>
    </div>
    <div id="listContainer"></div>
    <div class="loading" id="loading">加载中...</div>
    <div class="empty-tip" id="emptyTip" style="display:none;">🎉 文案已用完，请去飞书表格补充</div>
  </div>
  <div class="message" id="message"></div>

  <script>
    // 后端接口地址（部署后自动同源，无需修改）
    const API_BASE = '/api/copywenan';

    function showToast(text) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2000);
    }

    async function loadCopies() {
      const container = document.getElementById('listContainer');
      const loading = document.getElementById('loading');
      const emptyTip = document.getElementById('emptyTip');
      const countInfo = document.getElementById('countInfo');
      const refreshBtn = document.getElementById('refreshBtn');

      container.innerHTML = '';
      loading.style.display = 'block';
      emptyTip.style.display = 'none';
      refreshBtn.disabled = true;

      try {
        const resp = await fetch(API_BASE);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || '请求失败');

        const items = data.items || [];
        countInfo.textContent = `剩余 ${items.length} 条`;
        loading.style.display = 'none';

        if (items.length === 0) {
          emptyTip.style.display = 'block';
          return;
        }

        items.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.setAttribute('data-record-id', item.record_id);
          card.innerHTML = `
            <div class="card-content">${escapeHtml(item.combined)}</div>
            <div class="card-actions">
              <button class="btn btn-copy" onclick="copyAndDelete('${item.record_id}', this)">📋 复制并删除</button>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        loading.textContent = '加载失败，请稍后重试';
        console.error(err);
      } finally {
        refreshBtn.disabled = false;
      }
    }

    async function copyAndDelete(recordId, btn) {
      btn.disabled = true;
      try {
        const card = btn.closest('.card');
        const content = card.querySelector('.card-content').innerText;

        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(content);
        } else {
          const textarea = document.createElement('textarea');
          textarea.value = content;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
        }

        const resp = await fetch(`${API_BASE}?record_id=${recordId}`, { method: 'DELETE' });
        const result = await resp.json();
        if (!resp.ok) throw new Error(result.error || '删除失败');

        card.remove();
        const remaining = document.querySelectorAll('.card').length;
        document.getElementById('countInfo').textContent = `剩余 ${remaining} 条`;
        if (remaining === 0) document.getElementById('emptyTip').style.display = 'block';

        showToast('✅ 已复制并删除');
      } catch (err) {
        showToast('❌ 操作失败：' + err.message);
        btn.disabled = false;
      }
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    loadCopies();
  </script>
</body>
</html>
